name: Validate Tokens
on:
  pull_request:
    paths:
      - 'primitives.json'
      - 'semantic/**'
      - 'token-schema.json'
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install dependencies
        run: npm ci
      - name: Validate primitives schema
        run: npm run validate:schema
      - name: Validate semantic references
        run: npm run validate:refs
