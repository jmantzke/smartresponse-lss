<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="UTF-8">
   <link rel="icon" type="image/x-icon" href="favicon.ico">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <meta http-equiv="X-UA-Compatible" content="ie=edge">
   <title>Trip Summary — Wanderlust Travel App</title>
   <link rel="stylesheet" href="style.css">
</head>
<body class="proto-page">

   <header class="site-header">
      <h1 class="site-header__title">Wanderlust Travel App</h1>
      <a class="btn site-header__home" href="index.html">Home</a>
   </header>

   <main class="page">

      <h2 class="page-heading">Your trip is planned</h2>

      <div class="summary-card">
         <div class="summary-row">
            <span class="summary-row__label">From</span>
            <span class="summary-row__value">San Francisco, CA</span>
         </div>
         <div class="summary-row">
            <span class="summary-row__label">To</span>
            <span class="summary-row__value">Seattle, WA</span>
         </div>
         <div class="summary-row">
            <span class="summary-row__label">Duration</span>
            <span class="summary-row__value">4 days</span>
         </div>
         <div class="summary-row">
            <span class="summary-row__label">Daily driving</span>
            <span class="summary-row__value">4 hours</span>
         </div>
         <div class="summary-row">
            <span class="summary-row__label">Car</span>
            <span class="summary-row__value">Own vehicle</span>
         </div>
         <div class="summary-row">
            <span class="summary-row__label">Ferry included</span>
            <span class="summary-row__value">Yes — booked via Wanderlust</span>
         </div>
      </div>

      <div class="btn-container">
         <a class="btn btn--primary" href="stanford-module-four-jmantzke.html">Looks good</a>
      </div>

   </main>

   <footer class="site-footer">
      <p>&copy; 2026 Enfineitz LLC &mdash; Stanford Module 4 Prototype &middot; J. Mantzke</p>
   </footer>

</body>
</html>
